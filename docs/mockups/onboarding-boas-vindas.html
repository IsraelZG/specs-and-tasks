<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup — Boas-vindas / escolha de entrada (T-512/T-208-210)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
:root{color-scheme:light dark;
 --color-background-primary:#fff;--color-background-secondary:#f4f3ee;--color-background-tertiary:#ebeae3;
 --color-background-info:#E6F1FB;--color-background-success:#E1F5EE;
 --color-text-primary:#1f1e1b;--color-text-secondary:#5F5E5A;--color-text-tertiary:#8a8980;
 --color-text-info:#185FA5;--color-text-success:#0F6E56;
 --color-border-tertiary:rgba(0,0,0,0.15);--color-border-secondary:rgba(0,0,0,0.3);--color-border-info:#378ADD;
 --border-radius-md:8px;--border-radius-lg:12px;--border-radius-xl:16px;
 --font-sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
@media (prefers-color-scheme:dark){:root{
 --color-background-primary:#2a2925;--color-background-secondary:#211f1b;--color-background-tertiary:#1a1916;
 --color-background-info:#0C447C;--color-background-success:#085041;
 --color-text-primary:#ECEAE3;--color-text-secondary:#B4B2A9;--color-text-tertiary:#888780;
 --color-text-info:#85B7EB;--color-text-success:#5DCAA5;
 --color-border-tertiary:rgba(255,255,255,0.15);--color-border-secondary:rgba(255,255,255,0.3);}}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);margin:0;padding:24px;color:var(--color-text-primary)}
select{height:32px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);padding:0 6px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:14px 16px;border-radius:var(--border-radius-lg);background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);cursor:pointer;font-family:var(--font-sans);transition:background .12s}
.opt:hover{background:var(--color-background-secondary)}
.opt.primary{border:2px solid var(--color-border-info);background:var(--color-background-info)}
.ic{width:40px;height:40px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:20px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.opt.primary .ic{background:var(--color-background-primary);color:var(--color-text-info)}
</style>
</head>
<body>
<h2 class="sr-only">Tela de boas-vindas do SuperApp com três caminhos de entrada.</h2>
<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-xl);padding:1.25rem;">
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem 1.5rem;max-width:560px;margin:0 auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:1.5rem;">
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-success);"><i class="ti ti-shield-lock" style="font-size:16px" aria-hidden="true"></i>Local-first · P2P</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <select aria-label="Idioma" style="font-size:13px;">
          <option>Português (BR)</option><option>English</option><option>Español</option><option>Français</option><option>Deutsch</option><option>Italiano</option>
        </select>
        <button aria-label="Alternar tema" style="width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer"><i class="ti ti-moon" style="font-size:16px" aria-hidden="true"></i></button>
      </div>
    </div>
    <div style="text-align:center;margin:0.5rem 0 1.75rem;">
      <div style="width:52px;height:52px;border-radius:var(--border-radius-lg);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;font-weight:500;color:var(--color-text-primary);">S</div>
      <h1 style="font-size:22px;font-weight:500;margin:0 0 6px;">Bem-vindo ao SuperApp</h1>
      <p style="font-size:15px;color:var(--color-text-secondary);margin:0;line-height:1.6;">Sua rede, seus dados — sem servidor central.<br>Como você quer começar?</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="opt primary">
        <span class="ic"><i class="ti ti-affiliate" aria-hidden="true"></i></span>
        <span style="flex:1;"><span style="display:block;font-size:15px;font-weight:500;color:var(--color-text-primary);">Criar nova rede</span><span style="display:block;font-size:13px;color:var(--color-text-secondary);">Fundar um espaço novo (gênese)</span></span>
        <i class="ti ti-chevron-right" style="font-size:18px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
      </button>
      <button class="opt">
        <span class="ic"><i class="ti ti-ticket" aria-hidden="true"></i></span>
        <span style="flex:1;"><span style="display:block;font-size:15px;font-weight:500;color:var(--color-text-primary);">Entrar com convite</span><span style="display:block;font-size:13px;color:var(--color-text-secondary);">Recebi um link ou código</span></span>
        <i class="ti ti-chevron-right" style="font-size:18px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
      </button>
      <button class="opt">
        <span class="ic"><i class="ti ti-key" aria-hidden="true"></i></span>
        <span style="flex:1;"><span style="display:block;font-size:15px;font-weight:500;color:var(--color-text-primary);">Entrar com identidade</span><span style="display:block;font-size:13px;color:var(--color-text-secondary);">Já tenho uma seed ou dispositivo pareado</span></span>
        <i class="ti ti-chevron-right" style="font-size:18px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
      </button>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--color-text-tertiary);margin:1.5rem 0 0;line-height:1.6;">Suas chaves nunca saem do dispositivo. <a href="#" style="color:var(--color-text-info);">Como funciona?</a></p>
  </div>
</div>
</body>
</html>
