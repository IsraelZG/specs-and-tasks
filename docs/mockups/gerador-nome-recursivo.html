<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ferramenta — Gerador de sigla recursiva para o nome da rede</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
:root{color-scheme:light dark;
 --color-background-primary:#fff;--color-background-secondary:#f4f3ee;--color-background-tertiary:#ebeae3;
 --color-text-primary:#1f1e1b;--color-text-secondary:#5F5E5A;--color-text-tertiary:#8a8980;
 --color-border-tertiary:rgba(0,0,0,0.15);--color-border-secondary:rgba(0,0,0,0.3);
 --border-radius-md:8px;--border-radius-lg:12px;--border-radius-xl:16px;
 --font-sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
@media (prefers-color-scheme:dark){:root{
 --color-background-primary:#2a2925;--color-background-secondary:#211f1b;--color-background-tertiary:#1a1916;
 --color-text-primary:#ECEAE3;--color-text-secondary:#B4B2A9;--color-text-tertiary:#888780;
 --color-border-tertiary:rgba(255,255,255,0.15);--color-border-secondary:rgba(255,255,255,0.3);}}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);margin:0;padding:24px;color:var(--color-text-primary)}
select{height:36px;width:100%;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);padding:0 8px;font-family:inherit}
button{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-family:inherit}
button:hover{background:var(--color-background-secondary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.gen-lbl{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.gen-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);margin-bottom:8px}
.gen-dom{font-size:13px;color:var(--color-text-secondary);display:flex;align-items:center;gap:8px}
.gen-exp{font-size:15px;color:var(--color-text-primary)}
.gen-exp b{font-weight:500}
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
</style>
</head>
<body>
<h2 class="sr-only">Gerador de sigla recursiva: escolha três letras e veja a sigla expandir em quatro significados.</h2>
<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-xl);padding:1.25rem;">
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;max-width:560px;margin:0 auto;">
    <div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:14px;">
      <div style="flex:1;"><span class="gen-lbl">1ª (recursiva)</span><select id="l1"></select></div>
      <div style="flex:1;"><span class="gen-lbl">2ª letra</span><select id="l2"></select></div>
      <div style="flex:1;"><span class="gen-lbl">3ª letra</span><select id="l3"></select></div>
      <button id="sh" aria-label="Sortear palavras" style="height:36px;"><i class="ti ti-refresh" style="font-size:16px;vertical-align:-2px" aria-hidden="true"></i></button>
    </div>
    <div style="text-align:center;margin:6px 0 16px;">
      <div id="name" style="font-size:40px;font-weight:500;letter-spacing:2px;color:var(--color-text-primary);">RPC</div>
      <div id="rec" style="font-size:12px;color:var(--color-text-tertiary);margin-top:2px;"></div>
    </div>
    <div id="out"></div>
    <p style="text-align:center;font-size:12px;color:var(--color-text-tertiary);margin:14px 0 0;">Clique na sigla para fixá-la (versão widget chama o agente).</p>
  </div>
</div>
<script>
window.sendPrompt=window.sendPrompt||function(t){alert(t)};
(function(){
 var W={
  social:{A:["Amigos","Amizades","Ágora"],C:["Conexões","Conversas","Comunidade"],M:["Mensagens","Mural","Mundo"],P:["Pessoas","Posts","Praça"],R:["Rede","Relações","Roda"],T:["Trocas","Tribos","Timeline"],V:["Vínculos","Vozes","Vida"],E:["Encontros","Espaços"],L:["Laços","Links"],F:["Feed","Família"],N:["Notícias","Núcleo"],S:["Status","Stories"],D:["Diálogos"],O:["Onda"]},
  market:{A:["Anúncios","Achados"],C:["Comércio","Compras","Catálogo"],M:["Mercado","Marketplace"],P:["Produtos","Preços","Pechinchas"],R:["Reputação","Recomendações"],T:["Transações","Trocas"],V:["Vendas","Vitrines"],E:["Entregas","Estoque"],L:["Lojas","Liquidações"],F:["Feirão","Frete"],N:["Negócios","Negociações"],S:["Serviços","Sacola"],D:["Demandas"],O:["Ofertas","Oportunidades"]},
  fin:{A:["Aportes","Ativos"],C:["Crédito","Carteira","Conta"],M:["Moeda","Movimento"],P:["Pagamentos","Patrimônio"],R:["Receitas","Repasses","Rendimentos"],T:["Transferências","Tesouraria"],V:["Valores","Verbas"],E:["Economia","Extratos"],L:["Lucros","Liquidez"],F:["Finanças","Fundos","Faturas"],N:["Negócios"],S:["Saldos"],D:["Dinheiro","Dívidas"],O:["Orçamentos","Operações"]},
  office:{A:["Agenda","Análises"],C:["Colaboração","Conteúdo","Calendário"],M:["Mídia","Métricas"],P:["Projetos","Planilhas","Produtividade"],R:["Relatórios","Recursos","Rotinas"],T:["Tarefas","Times","Trabalho"],V:["Visão","Views"],E:["Equipes","Eventos"],L:["Listas","Lousas"],F:["Fluxos","Ferramentas","Folha"],N:["Notas"],S:["Sistemas"],D:["Documentos","Dados","Dashboards"],O:["Operações","Organização"]}
 };
 var DOMS=[["social","Rede social","#7F77DD"],["market","Marketplace","#BA7517"],["fin","Fintech","#1D9E75"],["office","Office / ERP","#378ADD"]];
 var LET=["A","C","M","P","R","T","V","E","L","F","N","S","D","O"];
 var REC=["R","Z","N","A","U","V","X","O","E","I","M","P","T","C","L"];
 function fill(id,arr,sel){var e=document.getElementById(id);e.innerHTML=arr.map(function(x){return '<option'+(x===sel?' selected':'')+'>'+x+'</option>'}).join('')}
 fill("l1",REC,"R");fill("l2",LET,"P");fill("l3",LET,"C");
 var shuf=0;
 function pick(dom,letter){var a=(W[dom]||{})[letter];if(!a||!a.length)return null;return a[shuf%a.length]}
 function render(){
  var a=document.getElementById("l1").value,b=document.getElementById("l2").value,c=document.getElementById("l3").value;
  document.getElementById("name").textContent=a+b+c;
  document.getElementById("rec").textContent=a+" = recursivo ("+a+b+c+")";
  document.getElementById("out").innerHTML=DOMS.map(function(d){
   var w2=pick(d[0],b),w3=pick(d[0],c);
   var txt=(w2&&w3)?('<b>'+w2+'</b> & <b>'+w3+'</b>'):'<span style="color:var(--color-text-tertiary)">sem palavra para '+(w2?c:b)+'</span>';
   return '<div class="gen-row"><span class="gen-dom"><span class="dot" style="background:'+d[2]+'"></span>'+d[1]+'</span><span class="gen-exp">'+txt+'</span></div>';
  }).join("");
 }
 ["l1","l2","l3"].forEach(function(id){document.getElementById(id).addEventListener("change",render)});
 document.getElementById("sh").addEventListener("click",function(){shuf++;render()});
 var nm=document.getElementById("name");nm.style.cursor="pointer";
 nm.addEventListener("click",function(){sendPrompt("Vamos trabalhar a marca em cima da sigla "+nm.textContent+".")});
 render();
})();
</script>
</body>
</html>
