<!doctype html>
<!--
  Painel Remoto — UI PoC (modelo B, ADR 0007). Esqueleto MÍNIMO, ponto de partida.
  Conecta num broker de realtime (Ably/Supabase) via WebSocket, fala o mesmo envelope JSON do
  painel-agente.mjs, e renderiza ledger/instâncias/saldo + botão despachar. O app "bonito" é a
  próxima task hardened — aqui é só prova de conceito, hospedável no Lovable.

  Preencha BROKER_WS_URL com o endpoint do seu broker (ver runbook no ADR). O token fica no
  localStorage (colado 1×). Cada comando vai como {type:'cmd', id, token, method, path}; a resposta
  volta como {type:'res', id, status, body}.
-->
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Painel Remoto</title>
<style>
  body{font:14px system-ui;margin:0;background:#0d1117;color:#c9d1d9}
  header{padding:12px 16px;background:#161b22;display:flex;gap:12px;align-items:center}
  input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px;border-radius:6px}
  button{background:#238636;border:0;color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer}
  button.warn{background:#9e6a03}
  main{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
  section{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px}
  h2{margin:0 0 8px;font-size:13px;color:#8b949e;text-transform:uppercase}
  pre{white-space:pre-wrap;font:12px ui-monospace;margin:0;max-height:40vh;overflow:auto}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#f85149}
  .dot.on{background:#3fb950}
</style></head>
<body>
<header>
  <span class="dot" id="conn"></span><b>Painel Remoto</b>
  <input id="token" placeholder="PAINEL_TOKEN" size="40">
  <button onclick="saveToken()">salvar token</button>
  <button class="warn" onclick="send('POST','/api/dispatch')">Despachar ($$)</button>
  <button onclick="refresh()">atualizar</button>
</header>
<main>
  <section><h2>Ledger</h2><pre id="ledger">—</pre></section>
  <section><h2>Instâncias rodando</h2><pre id="instances">—</pre></section>
  <section><h2>Saldos</h2><pre id="saldo">—</pre></section>
  <section><h2>Status proxies</h2><pre id="status">—</pre></section>
</main>
<script>
  // ⚙️ Preencha com o WS do seu broker (Ably/Supabase). Ver runbook no ADR 0007.
  const BROKER_WS_URL = ""; // ex.: "wss://realtime.ably.io/..." ou o endpoint do Supabase Realtime
  const pending = new Map(); let ws;

  function saveToken(){ localStorage.PAINEL_TOKEN = document.getElementById('token').value.trim(); }
  function token(){ return localStorage.PAINEL_TOKEN || ''; }

  function connect(){
    if(!BROKER_WS_URL){ document.getElementById('ledger').textContent='⚠️ configure BROKER_WS_URL'; return; }
    ws = new WebSocket(BROKER_WS_URL);
    ws.onopen = ()=>{ document.getElementById('conn').classList.add('on'); refresh(); };
    ws.onclose= ()=>{ document.getElementById('conn').classList.remove('on'); setTimeout(connect, 2000); };
    ws.onmessage = (e)=>{ const m=JSON.parse(e.data); if(m.type!=='res')return;
      const cb=pending.get(m.id); if(cb){ pending.delete(m.id); cb(m); } };
  }
  function send(method, path){
    const id = Math.random().toString(36).slice(2);
    return new Promise((res)=>{ pending.set(id, res);
      ws.send(JSON.stringify({type:'cmd', id, token:token(), method, path})); });
  }
  async function show(el, method, path){
    const r = await send(method, path);
    document.getElementById(el).textContent =
      r.status===200 ? JSON.stringify(r.body, null, 2) : `HTTP ${r.status}: ${JSON.stringify(r.body)}`;
  }
  function refresh(){ show('ledger','GET','/api/ledger'); show('instances','GET','/api/instances');
    show('saldo','GET','/api/saldo'); show('status','GET','/api/status'); }

  document.getElementById('token').value = token();
  connect();
</script>
</body></html>
